version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis-master:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes

  redis-sentinel:
    image: redis:7-alpine
    restart: always
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 1' > /etc/sentinel.conf &&
             redis-sentinel /etc/sentinel.conf"
    depends_on:
      - redis-master

  backend:
    image: chatty-backend:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis-master:6379/0
      APP_ENV: production
    env_file: .env.prod

  frontend:
    image: chatty-frontend:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
